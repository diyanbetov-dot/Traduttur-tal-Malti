<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traduttur Ingliż-Malti</title>
    <style>
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #18202a;
            background: #f5f7fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 32px;
            background: #f5f7fb;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.3rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 8px 0 20px;
            color: #5d6875;
            line-height: 1.45;
        }

        .panel {
            background: white;
            border: 1px solid #dfe5ee;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(24, 32, 42, 0.06);
        }

        .translator-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 18px;
        }

        .pane {
            min-width: 0;
        }

        .pane-heading,
        .output-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            min-height: 42px;
        }

        label,
        .output-label {
            font-weight: 750;
        }

        .output-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        textarea,
        .output,
        select,
        button {
            font: inherit;
        }

        textarea,
        .output {
            width: 100%;
            min-height: 270px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            background: #fbfdff;
            color: #18202a;
            line-height: 1.45;
        }

        textarea {
            resize: vertical;
        }

        .output {
            white-space: pre-wrap;
        }

        .output:empty::before {
            content: attr(data-placeholder);
            color: #7b8794;
        }

        .ambiguous-word {
            position: relative;
            display: inline-block;
            background: #fff3a3;
            border-radius: 5px;
            padding: 0 3px;
            cursor: pointer;
        }

        .ambiguous-word::before {
            content: "?";
            position: absolute;
            top: -0.75em;
            left: -0.45em;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            background: #facc15;
            color: #18202a;
            font-size: 0.7em;
            font-weight: 900;
            line-height: 1em;
            text-align: center;
            border: 1px solid #d4a800;
        }

        .suggestion-popover {
            display: none;
            position: absolute;
            z-index: 20;
            left: 0;
            top: 1.8em;
            width: max-content;
            max-width: min(20rem, 90vw);
            background: white;
            border: 1px solid #d6b600;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(24, 32, 42, 0.18);
            padding: 10px;
            color: #18202a;
            white-space: normal;
        }

        .ambiguous-word.open .suggestion-popover {
            display: block;
        }

        .suggestion-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: start;
            column-gap: 8px;
            width: 100%;
            padding: 7px 8px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #18202a;
            font: inherit;
            text-align: left;
            cursor: pointer;
        }

        .suggestion-row:hover {
            background: #fff3a3;
        }

        .suggestion-row strong {
            white-space: nowrap;
        }

        .suggestion-row .suggestion-meaning {
            display: inline;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        select {
            min-height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0 10px;
            background: white;
            color: #18202a;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .buttons-left,
        .buttons-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .buttons-right {
            margin-left: auto;
        }

        button {
            min-height: 40px;
            border: 1px solid #cf3d1e;
            border-radius: 8px;
            padding: 0 16px;
            background: #cf3d1e;
            color: white;
            font-weight: 750;
            cursor: pointer;
        }

        button.secondary {
            background: #e7eef8;
            color: #18202a;
            border-color: #aeb9c8;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.58;
        }

        .status-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 12px;
        }

        .status-row {
            min-height: 24px;
            color: #5d6875;
            font-weight: 650;
        }

        .status-row.error {
            color: #b42318;
        }

        .ai-status {
            min-height: 24px;
            flex: 0 0 auto;
            border: 1px solid #aeb9c8;
            border-radius: 6px;
            padding: 2px 10px;
            color: #5d6875;
            background: #f8fafc;
            font-size: 0.84rem;
            font-weight: 800;
            letter-spacing: 0;
        }

        .ai-status.on {
            border-color: #18794e;
            color: #18794e;
            background: #e9f8ef;
        }

        .ai-status.off {
            border-color: #aeb9c8;
            color: #5d6875;
            background: #f8fafc;
        }

        .version-tag {
            font-size: 0.45em;
            font-style: italic;
            color: #7b8794;
            font-weight: normal;
            margin-left: 10px;
            vertical-align: middle;
        }

        .loading-bar {
            position: relative;
            overflow: hidden;
            height: 6px;
            margin-top: 14px;
            border-radius: 999px;
            background: #e7eef8;
            opacity: 0;
        }

        .loading-bar.active {
            opacity: 1;
        }

        .loading-bar::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 38%;
            border-radius: inherit;
            background: #cf3d1e;
            transform: translateX(-110%);
        }

        .loading-bar.active::before {
            animation: loading-slide 0.9s ease-in-out infinite;
        }

        @keyframes loading-slide {
            0% {
                transform: translateX(-110%);
            }

            100% {
                transform: translateX(280%);
            }
        }

        .details {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        .candidate {
            border: 1px solid #dfe5ee;
            border-radius: 8px;
            padding: 12px;
            background: white;
        }

        .candidate strong {
            display: block;
            margin-bottom: 4px;
        }

        .candidate span {
            color: #687586;
            font-size: 0.92rem;
        }

        .candidate button {
            margin-top: 8px;
            min-height: 34px;
            padding: 0 12px;
        }

        .dev-panel {
            display: none;
        }

        /* ── Dark mode ─────────────────────────────────────────── */
        body.dark-mode {
            background: #0f172a;
            color: #f8fafc;
        }

        body.dark-mode .panel {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        body.dark-mode textarea,
        body.dark-mode .output,
        body.dark-mode select {
            background: #0f172a;
            border-color: #475569;
            color: #f8fafc;
        }

        body.dark-mode .output:empty::before {
            color: #64748b;
        }

        body.dark-mode button.secondary {
            background: #334155;
            color: #f8fafc;
            border-color: #475569;
        }

        body.dark-mode .subtitle {
            color: #94a3b8;
        }

        body.dark-mode .status-row {
            color: #94a3b8;
        }

        body.dark-mode .ai-status {
            background: #0f172a;
        }

        body.dark-mode .ai-status.on {
            color: #86efac;
            border-color: #22c55e;
            background: #052e1a;
        }

        body.dark-mode .ai-status.off {
            color: #94a3b8;
            border-color: #475569;
        }

        body.dark-mode .candidate {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .candidate span {
            color: #94a3b8;
        }

        body.dark-mode .loading-bar {
            background: #334155;
        }

        body.dark-mode .ambiguous-word {
            background: #713f12;
            color: #f8fafc;
        }

        body.dark-mode .ambiguous-word::before {
            background: #ca8a04;
            color: #0f172a;
            border-color: #a16207;
        }

        body.dark-mode .suggestion-popover {
            background: #1e293b;
            color: #f8fafc;
            border-color: #ca8a04;
        }

        body.dark-mode .suggestion-row {
            color: #f8fafc;
        }

        body.dark-mode .suggestion-row:hover {
            background: #713f12;
        }

        @media (max-width: 760px) {
            body {
                padding: 18px;
            }

            .translator-grid {
                grid-template-columns: 1fr;
            }

            .pane-heading,
            .output-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .output-controls {
                justify-content: flex-start;
                width: 100%;
            }

            select {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="top-bar">
            <button id="darkModeToggle" class="secondary" type="button">🌙 Dark Mode</button>
            <button id="langToggle" class="secondary" type="button"><img src="https://flagcdn.com/w20/mt.png" alt="MT"
                    style="width:18px;margin-right:6px;vertical-align:-2px;"> Aqleb għall-Malti</button>
        </div>

        <h1 id="pageTitle">
            <span id="titleText">English to Maltese Translator</span>
            <span id="versionText" class="version-tag">Alpha 0.1.0</span>
        </h1>
        <p id="subtitle" class="subtitle">Traduttur b'regoli għal frażijiet Maltin u kuntest lokali.</p>

        <section class="panel">
            <div class="translator-grid">
                <section class="pane">
                    <div class="pane-heading">
                        <label id="sourceLabel" for="sourceText">Source text</label>
                    </div>
                    <textarea id="sourceText" spellcheck="true"></textarea>
                </section>

                <section class="pane">
                    <div class="output-heading">
                        <div id="outputLabel" class="output-label">Translation</div>
                        <div class="output-controls">
                            <select id="direction" aria-label="Translation direction">
                                <option value="en-mt">English to Maltese</option>
                                <option value="mt-en">Maltese to English</option>
                            </select>
                            <button id="swapButton" class="secondary" type="button">Swap</button>
                        </div>
                    </div>
                    <div id="translatedText" class="output" aria-live="polite"></div>
                </section>
            </div>

            <div class="loading-bar" id="loadingBar"></div>

            <div class="button-row">
                <div class="buttons-left">
                    <button id="translateButton" type="button">Translate</button>
                    <button id="clearButton" class="secondary" type="button">Clear</button>
                </div>
                <div class="buttons-right">
                    <button id="showSuggestionsButton" class="secondary" type="button">Show suggestions</button>
                    <button id="copyButton" class="secondary" type="button">Copy</button>
                </div>
            </div>

            <div class="status-line">
                <div id="status" class="status-row" aria-live="polite"></div>
                <div id="aiStatus" class="ai-status off" title="AI helper status">AI OFF</div>
            </div>
        </section>

        <section id="devPanel" class="dev-panel"></section>
    </main>

    <script>
        const ENABLE_DEV_TOOLS = "REPLACE_ME_ENABLE_DEV_TOOLS" === "True";
        const SHOW_AI_STATUS_BUTTON = false;

        const translations = {
            en: {
                htmlLang: "en",
                toggleBtn: '<img src="https://flagcdn.com/w20/mt.png" alt="MT" style="width:18px;margin-right:6px;vertical-align:-2px;"> Aqleb għall-Malti',
                darkModeBtn: "🌙 Dark Mode",
                lightModeBtn: "☀️ Light Mode",
                title: "English to Maltese Translator",
                subtitle: "Traduttur b'regoli għal frażijiet Maltin u kuntest lokali.",
                source: "Source text",
                output: "Translation",
                translate: "Translate",
                clear: "Clear all",
                copy: "Copy",
                swap: "Swap",
                writeTextFirst: "Write text first.",
                translating: "Translating...",
                done: "Done.",
                copied: "Copied.",
                failed: "Translation failed.",
                useSuggestion: "Use this",
                showSuggestionsOn: "Don't show suggestions",
                showSuggestionsOff: "Show suggestions",
                placeholderInput: "Paste text here...",
                placeholderResults: "Translation will appear here.",
                versionText: "Alpha 0.1.0",
            },
            mt: {
                htmlLang: "mt",
                toggleBtn: '<img src="https://flagcdn.com/w20/gb.png" alt="GB" style="width:18px;margin-right:6px;vertical-align:0px;"> Switch to English',
                darkModeBtn: "🌙 Aqleb għall-Mudlam",
                lightModeBtn: "☀️ Aqleb għall-Mudwal",
                title: "Traduttur Ingliż-Malti",
                subtitle: "Traduttur b'regoli għal frażijiet Maltin u kuntest lokali.",
                source: "Test oriġinali",
                output: "Traduzzjoni",
                translate: "Ittraduċi",
                clear: "Ħassar kollox",
                copy: "Ikkopja r-riżultat",
                swap: "Aqleb traduzzjoni",
                writeTextFirst: "L-ewwel ikteb it-test tiegħek.",
                translating: "Traduzzjoni fil-progress...",
                done: "Bil-lest.",
                copied: "Ikkupjat.",
                failed: "It-traduzzjoni falliet.",
                useSuggestion: "Uża din",
                showSuggestionsOn: "Turix suġġerimenti",
                showSuggestionsOff: "Uri suġġerimenti",
                placeholderInput: "Itfa' test bil-Malti hawn...",
                placeholderResults: "Ir-riżultat se jidher hawn.",
                versionText: "Alfa 0.1.0",
            },
        };

        const sourceText = document.getElementById("sourceText");
        const translatedText = document.getElementById("translatedText");
        const direction = document.getElementById("direction");
        const translateButton = document.getElementById("translateButton");
        const copyButton = document.getElementById("copyButton");
        const showSuggestionsButton = document.getElementById("showSuggestionsButton");
        const clearButton = document.getElementById("clearButton");
        const swapButton = document.getElementById("swapButton");
        const langToggle = document.getElementById("langToggle");
        const darkModeToggle = document.getElementById("darkModeToggle");
        const status = document.getElementById("status");
        const aiStatus = document.getElementById("aiStatus");
        if (!SHOW_AI_STATUS_BUTTON) {
            aiStatus.style.display = "none";
        }
        const loadingBar = document.getElementById("loadingBar");

        let latestTranslation = "";
        let currentLang = localStorage.getItem("translatorLang") || "en";
        let showSuggestions = localStorage.getItem("showSuggestions") !== "false";
        let currentHighlights = [];

        function t(key) {
            return translations[currentLang][key] || translations.en[key] || key;
        }

        function updateShowSuggestionsButton() {
            if (!showSuggestionsButton) return;
            const labels = translations[currentLang];
            if (showSuggestions) {
                showSuggestionsButton.textContent = labels.showSuggestionsOn;
            } else {
                showSuggestionsButton.textContent = labels.showSuggestionsOff;
            }
        }

        function applyLanguage() {
            const labels = translations[currentLang];
            document.documentElement.lang = labels.htmlLang;
            document.getElementById("titleText").textContent = labels.title;
            document.getElementById("versionText").textContent = labels.versionText;
            document.getElementById("subtitle").textContent = labels.subtitle;
            document.getElementById("sourceLabel").textContent = labels.source;
            document.getElementById("outputLabel").textContent = labels.output;
            translateButton.textContent = labels.translate;
            clearButton.textContent = labels.clear;
            copyButton.textContent = labels.copy;
            swapButton.textContent = labels.swap;
            langToggle.innerHTML = labels.toggleBtn;
            const isDark = document.body.classList.contains("dark-mode");
            darkModeToggle.textContent = isDark ? labels.lightModeBtn : labels.darkModeBtn;
            updateShowSuggestionsButton();
            sourceText.placeholder = labels.placeholderInput;
            translatedText.setAttribute("data-placeholder", labels.placeholderResults);
        }

        function setLoading(isLoading) {
            loadingBar.classList.toggle("active", isLoading);
            translateButton.disabled = isLoading;
        }

        function setStatus(message, type = "") {
            status.textContent = message;
            status.classList.toggle("error", type === "error");
        }

        function setAiStatus(isOn) {
            aiStatus.textContent = isOn ? "AI ON" : "AI OFF";
            aiStatus.classList.toggle("on", isOn);
            aiStatus.classList.toggle("off", !isOn);
        }

        async function refreshAiStatus() {
            try {
                const response = await fetch("/health", { cache: "no-store" });
                const data = await response.json();
                setAiStatus(Boolean(data.ai_enabled && data.ai_key_present));
            } catch (_error) {
                setAiStatus(false);
            }
        }

        async function postJson(url, payload) {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.error || t("failed"));
            }
            return data;
        }

        function closePopovers(except = null) {
            document.querySelectorAll(".ambiguous-word.open").forEach((item) => {
                if (item !== except) {
                    item.classList.remove("open");
                }
            });
        }

        function createSuggestionPopover(highlight) {
            const choices = highlight.choices || [];
            const highlightText = highlight.text;
            const popover = document.createElement("span");
            popover.className = "suggestion-popover";

            choices.forEach((choice) => {
                const row = document.createElement("button");
                row.type = "button";
                row.className = "suggestion-row";

                const word = document.createElement("strong");
                word.textContent = choice.word || choice.text || "";
                row.appendChild(word);

                const meaning = document.createElement("span");
                meaning.className = "suggestion-meaning";
                const meaningText = choice.meaning || choice.explanation || "";
                meaning.textContent = meaningText ? `: ${meaningText}` : "";
                row.appendChild(meaning);

                row.addEventListener("click", (event) => {
                    event.stopPropagation();
                    const selected = choice.word || choice.text || "";
                    if (!selected) {
                        return;
                    }
                    const targetReplace = highlight.replaceText || highlightText;
                    const replacement = choice.replaceWith || selected;
                    latestTranslation = latestTranslation.replace(targetReplace, replacement);
                    currentHighlights = currentHighlights.map((h) => {
                        if (h.text === highlightText) {
                            return {
                                ...h,
                                text: selected,
                                replaceText: replacement
                            };
                        }
                        return h;
                    });
                    renderTranslatedOutput(latestTranslation, currentHighlights);
                    setStatus(t("done"));
                });

                popover.appendChild(row);
            });

            return popover;
        }

        function renderTranslatedOutput(text, highlights = []) {
            translatedText.innerHTML = "";
            if (!showSuggestions) {
                translatedText.textContent = text || "";
                return;
            }
            const usableHighlights = (highlights || []).filter((item) => {
                return item && item.text && Array.isArray(item.choices) && item.choices.length > 0;
            });

            if (!usableHighlights.length) {
                translatedText.textContent = text || "";
                return;
            }

            let cursor = 0;
            for (const highlight of usableHighlights) {
                const start = text.indexOf(highlight.text, cursor);
                if (start < 0) {
                    continue;
                }
                if (start > cursor) {
                    translatedText.appendChild(document.createTextNode(text.slice(cursor, start)));
                }

                const span = document.createElement("span");
                span.className = "ambiguous-word";
                span.tabIndex = 0;
                span.appendChild(document.createTextNode(highlight.text));
                span.appendChild(createSuggestionPopover(highlight));
                span.addEventListener("click", (event) => {
                    event.stopPropagation();
                    closePopovers(span);
                    span.classList.toggle("open");
                });
                translatedText.appendChild(span);
                cursor = start + highlight.text.length;
            }

            if (cursor < text.length) {
                translatedText.appendChild(document.createTextNode(text.slice(cursor)));
            }
        }

        // Details section removed as requested

        async function translate() {
            const text = sourceText.value.trim();
            if (!text) {
                translatedText.textContent = "";
                setStatus(t("writeTextFirst"), "error");
                return;
            }

            setLoading(true);
            setStatus(t("translating"));

            try {
                const data = await postJson("/translate", {
                    text,
                    direction: direction.value,
                });
                latestTranslation = data.translated_text || "";
                currentHighlights = data.highlights || [];
                renderTranslatedOutput(latestTranslation, currentHighlights);
                setStatus(t("done"));
                refreshAiStatus();
            } catch (error) {
                renderTranslatedOutput("", []);
                setStatus(error.message || t("failed"), "error");
            } finally {
                setLoading(false);
            }
        }

        async function copyResult() {
            if (!latestTranslation) {
                return;
            }
            await navigator.clipboard.writeText(latestTranslation);
            setStatus(t("copied"));
        }

        function clearAll() {
            sourceText.value = "";
            currentHighlights = [];
            renderTranslatedOutput("", []);
            latestTranslation = "";
            setStatus("");
        }

        function swapDirection() {
            direction.value = direction.value === "en-mt" ? "mt-en" : "en-mt";
            const source = sourceText.value;
            sourceText.value = latestTranslation;
            latestTranslation = source;
            currentHighlights = [];
            renderTranslatedOutput(source, []);
        }

        document.addEventListener("click", () => closePopovers());

        langToggle.addEventListener("click", () => {
            currentLang = currentLang === "en" ? "mt" : "en";
            localStorage.setItem("translatorLang", currentLang);
            applyLanguage();
        });

        darkModeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("darkMode", document.body.classList.contains("dark-mode") ? "1" : "0");
            applyLanguage();
        });

        if (localStorage.getItem("darkMode") === "1") {
            document.body.classList.add("dark-mode");
        }

        showSuggestionsButton.addEventListener("click", () => {
            showSuggestions = !showSuggestions;
            localStorage.setItem("showSuggestions", String(showSuggestions));
            updateShowSuggestionsButton();
            renderTranslatedOutput(latestTranslation, currentHighlights);
        });

        translateButton.addEventListener("click", translate);
        copyButton.addEventListener("click", copyResult);
        clearButton.addEventListener("click", clearAll);
        swapButton.addEventListener("click", swapDirection);

        if (ENABLE_DEV_TOOLS) {
            document.getElementById("devPanel").style.display = "block";
        }

        applyLanguage();
        refreshAiStatus();
    </script>
</body>

</html>
